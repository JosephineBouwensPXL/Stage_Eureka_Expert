services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env.local
    environment:
      STT_SIDECAR_URL: http://speech-sidecar:8001/transcribe
      TTS_SIDECAR_URL: http://speech-sidecar:8001/synthesize
    depends_on:
      - speech-sidecar
    ports:
      - "3001:3001"
    restart: unless-stopped

  speech-sidecar:
    build:
      context: ./speech-sidecar
      dockerfile: Dockerfile
    env_file:
      - ./.env.local
    environment:
      TTS_ENGINE: pyttsx3
    ports:
      - "8001:8001"
    restart: unless-stopped
