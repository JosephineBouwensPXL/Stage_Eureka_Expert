services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001
        GEMINI_API_KEY: ${GEMINI_API_KEY}
        ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env.local
    ports:
      - "3001:3001"
    restart: unless-stopped
